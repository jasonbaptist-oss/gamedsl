name: GameDSL CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup OCaml
      uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: 5.1.x

    - name: Retrieve Cache
      uses: actions/cache@v4
      with:
        path: ~/.opam
        key: ${{ runner.os }}-opam-${{ hashFiles('**/*.opam') }}
        restore-keys: |
          ${{ runner.os }}-opam-

    - name: Install Dependencies
      run: |
        opam update
        opam install -y dune ounit2 ocamlformat

    - name: Run Linter (ocamlformat)
      run: opam exec -- dune build @fmt

    - name: Build Compiler
      run: opam exec -- dune build

    - name: Run OUnit2 Unit Tests
      run: opam exec -- dune runtest
